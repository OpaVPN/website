<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpaVPN | Atualização de Infraestrutura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; }
        .text-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white overflow-hidden">

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900/10 rounded-full blur-[120px]"></div>
    </div>

    <main class="relative z-10 text-center px-6">
        <div class="mb-12">
            <h2 class="text-2xl font-black tracking-tighter uppercase">OPA<span class="text-blue-500">VPN</span></h2>
            <div class="h-1 w-12 bg-blue-600 mx-auto mt-2"></div>
        </div>

        <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-6 leading-none">
            ESTAMOS <br> <span class="text-blue-500 text-glow">ATUALIZANDO</span> <br> NOSSA REDE.
        </h1>
        
        <p class="text-slate-400 font-bold uppercase tracking-widest text-xs md:text-sm max-w-md mx-auto leading-relaxed">
            Estamos revisando nossas regras de negócio e infraestrutura de segurança para oferecer a melhor conectividade do Brasil.
        </p>

        <div class="mt-12 flex flex-col items-center">
            <div class="flex items-center gap-3 mb-4">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span>
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500">Otimizando Servidores.</span>
            </div>
            <div class="w-48 h-1 bg-white/10 rounded-full overflow-hidden">
                <div class="bg-blue-600 h-full w-2/3 animate-[pulse_2s_infinite]"></div>
            </div>
        </div>

        <div class="mt-16">
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-4">Dúvidas ou Suporte?</p>
            <a href="mailto:suporte@opavpn.com.br" class="text-white hover:text-blue-500 transition font-black uppercase text-xs tracking-widest border-b border-white/20 pb-1">
                contato@opavpn.com.br
            </a>
        </div>
    </main>

</body>
</html>
